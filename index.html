<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codey Workspace</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #121212;
      --text: #f5f5f7;
      --muted: #86868b;
      --accent: #2997ff;
      --border: #333336;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      padding: 12px 0;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--accent);
    }
    button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    button:active {
      opacity: 0.8;
    }
    .tree-container {
      margin-top: 40px;
    }
    .file-item {
      padding: 12px 0;
      font-family: "SF Mono", ui-monospace, monospace;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .file-item.blob {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Codey</h1>
    
    <div id="setup">
      <div class="input-group">
        <label>GitHub PAT</label>
        <input type="password" id="token" placeholder="github_pat_...">
      </div>
      <div class="input-group">
        <label>Repository Owner</label>
        <input type="text" id="owner" placeholder="e.g. your-username">
      </div>
      <div class="input-group">
        <label>Repository Name</label>
        <input type="text" id="repo" placeholder="e.g. operationship">
      </div>
      <div class="input-group">
        <label>Branch</label>
        <input type="text" id="branch" value="main">
      </div>
      <button onclick="loadRepository()">Map Repository</button>
    </div>

    <div id="workspace" class="tree-container" style="display: none;">
      <h3 style="font-size: 16px; font-weight: 500; margin-bottom: 16px; color: var(--muted);">Project Structure</h3>
      <div id="fileTree"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('token').value = localStorage.getItem('codey_token') || '';
      document.getElementById('owner').value = localStorage.getItem('codey_owner') || '';
      document.getElementById('repo').value = localStorage.getItem('codey_repo') || '';
      document.getElementById('branch').value = localStorage.getItem('codey_branch') || 'main';
    });

    async function loadRepository() {
      const token = document.getElementById('token').value;
      const owner = document.getElementById('owner').value;
      const repo = document.getElementById('repo').value;
      const branch = document.getElementById('branch').value;

      if (!token || !owner || !repo) return alert("Missing credentials.");

      localStorage.setItem('codey_token', token);
      localStorage.setItem('codey_owner', owner);
      localStorage.setItem('codey_repo', repo);
      localStorage.setItem('codey_branch', branch);

      const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;

      try {
        const response = await fetch(url, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (!response.ok) throw new Error(await response.text());

        const data = await response.json();
        renderTree(data.tree);
        
        document.getElementById('workspace').style.display = 'block';
        document.getElementById('setup').style.display = 'none';
      } catch (error) {
        alert("Failed to connect. Error: " + error.message);
      }
    }

    function renderTree(tree) {
      const container = document.getElementById('fileTree');
      container.innerHTML = '';
      
      const filteredTree = tree.filter(item => !item.path.includes('node_modules') && !item.path.includes('.next'));
      
      filteredTree.forEach(item => {
        const div = document.createElement('div');
        div.className = `file-item ${item.type}`;
        
        const icon = item.type === 'tree' ? '📁' : '📄';
        div.innerHTML = `<span>${icon}</span> <span>${item.path}</span>`;
        
        container.appendChild(div);
      });
    }
  </script>
</body>
</html>
