<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codey OS</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 class="logo">Codey</h1>
      <div id="statusIndicator" class="status-indicator">Initializing Network...</div>
    </header>

    <main id="authView" class="view-layer">
      <div class="form-group">
        <input type="password" id="githubToken" placeholder="GitHub Personal Access Token">
      </div>
      <div class="form-group">
        <input type="password" id="geminiToken" placeholder="Gemini API Key">
      </div>
      <div class="form-group">
        <input type="text" id="repoOwner" placeholder="Organization or Username">
      </div>
      <div class="form-group">
        <input type="text" id="repoName" placeholder="Repository Name">
      </div>
      <button id="bootSystemBtn" class="primary-btn">Initialize Workspace</button>
    </main>

    <main id="workspaceView" class="view-layer hidden">
      <div class="control-bar">
        <select id="modelSelector" class="minimal-select">
          <option>Loading optimal models...</option>
        </select>
        <button id="runDebuggerBtn" class="secondary-btn">Scan CI/CD Errors</button>
      </div>

      <div class="chat-interface" id="terminal"></div>
      
      <div class="input-area">
        <textarea id="promptInput" placeholder="Describe the feature or fix..."></textarea>
        <button id="sendBtn" class="action-btn">Send</button>
      </div>
    </main>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
